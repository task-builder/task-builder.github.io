<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBot Miner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container { text-align: center; padding: 30px 20px; }
.icon { font-size: 60px; margin-bottom: 20px; }
h1 { font-size: 22px; margin-bottom: 10px; color: #f0c040; }
p { font-size: 14px; color: #aaa; margin-bottom: 30px; }
.timer-box {
  background: #1a1a1a;
  border: 2px solid #f0c040;
  border-radius: 16px;
  padding: 20px 40px;
  margin-bottom: 30px;
  display: inline-block;
}
.timer { font-size: 48px; font-weight: bold; color: #f0c040; }
.timer-label { font-size: 12px; color: #888; margin-top: 4px; }
.btn {
  display: inline-block;
  background: #f0c040;
  color: #000;
  font-weight: bold;
  font-size: 16px;
  padding: 14px 32px;
  border-radius: 12px;
  text-decoration: none;
  opacity: 0.4;
  pointer-events: none;
  transition: opacity 0.3s;
  border: none;
  cursor: pointer;
  font-family: Arial, sans-serif;
}
.btn.active { opacity: 1; pointer-events: all; }
.note { font-size: 12px; color: #666; margin-top: 16px; }
.ad-close-widget {
  position: fixed;
  top: 16px;
  right: 16px;
  background: #1a1a1a;
  border: 2px solid #f0c040;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  color: #f0c040;
  cursor: default;
  user-select: none;
}
.ad-close-widget.closable {
  cursor: pointer;
  background: #f0c040;
  color: #000;
}
.ad-close-widget.reopen {
  cursor: pointer;
  background: #1a1a1a;
  border-color: #e05555;
  color: #e05555;
}
.ad-warning {
  position: fixed;
  top: 68px;
  right: 16px;
  max-width: 220px;
  background: #2a1414;
  border: 1px solid #e05555;
  color: #ffb3b3;
  font-size: 11px;
  line-height: 1.4;
  padding: 8px 10px;
  border-radius: 8px;
  text-align: left;
  display: none;
}
.ad-warning.show { display: block; }
</style>
</head>
<body>
<div id="adCloseWidget" class="ad-close-widget" onclick="widgetClick()">10</div>
<div id="adWarning" class="ad-warning"></div>
<div class="container">
  <div class="icon">🎁</div>
  <h1>TaskBot Miner</h1>
  <p>Please wait while your reward is being processed...</p>
  <div class="timer-box">
    <div class="timer" id="countdown">10</div>
    <div class="timer-label">seconds</div>
  </div>
  <br>
  <button class="btn" id="returnBtn" onclick="goToBot()">🔙 Back to the Bot</button>
  <div class="note" id="note">The button will be activated when the timer runs out</div>
</div>
<script>
// URL del smartlink, reutilizada tanto para la apertura inicial
// como para cuando el usuario tenga que reabrirlo.
const SMARTLINK_URL = "https://omg10.com/4/11092522";

// Estado del flujo del anuncio: "counting" (corriendo los 10s),
// "needs_reopen" (lo cerraron antes de tiempo, hay que reabrir),
// "closable" (completó los 10s, ya se puede cerrar).
let adWindow = window.open(SMARTLINK_URL, "_blank");
let adSeconds = 10;
let adState = "counting";
let adTimer = null;

const adCloseWidget = document.getElementById("adCloseWidget");
const adWarning = document.getElementById("adWarning");

function tickAdTimer() {
  // Si la pestaña del anuncio ya no existe (el usuario la cerró)
  // y todavía no se completaron los 10 segundos:
  if (adState === "counting" && adWindow && adWindow.closed) {
    clearInterval(adTimer);
    adState = "needs_reopen";
    adCloseWidget.textContent = "↻";
    adCloseWidget.classList.remove("closable");
    adCloseWidget.classList.add("reopen");
    adWarning.textContent = "Closed the ad before 10 seconds. Reopen it and wait for the full countdown.";
    adWarning.classList.add("show");
    return;
  }

  adSeconds--;
  if (adSeconds <= 0) {
    clearInterval(adTimer);
    adState = "closable";
    adCloseWidget.textContent = "✕";
    adCloseWidget.classList.add("closable");
  } else {
    adCloseWidget.textContent = adSeconds;
  }
}

adTimer = setInterval(tickAdTimer, 1000);

function widgetClick() {
  if (adState === "closable") {
    if (adWindow && !adWindow.closed) {
      adWindow.close();
    }
    adCloseWidget.style.display = "none";
    adWarning.classList.remove("show");
    return;
  }

  if (adState === "needs_reopen") {
    // Reabre el anuncio y reinicia el conteo completo desde 10.
    adWindow = window.open(SMARTLINK_URL, "_blank");
    adSeconds = 10;
    adState = "counting";
    adCloseWidget.textContent = adSeconds;
    adCloseWidget.classList.remove("reopen");
    adWarning.classList.remove("show");
    adTimer = setInterval(tickAdTimer, 1000);
    return;
  }

  // Si está en "counting", el clic todavía no hace nada.
}

// Cuenta regresiva
let seconds = 10;
const countdown = document.getElementById("countdown");
const btn = document.getElementById("returnBtn");
const note = document.getElementById("note");
const timer = setInterval(() => {
  seconds--;
  countdown.textContent = seconds;
  if (seconds <= 0) {
    clearInterval(timer);
    countdown.textContent = "✓";
    btn.classList.add("active");
    note.textContent = "¡Reward ready! Go back to the bot.";
  }
}, 1000);

// Bandera para que el botón solo reaccione una vez por carga de página.
let alreadyClicked = false;

// Intenta abrir la app nativa de Telegram (tg://). Si detectamos que
// la ventana perdió el foco (señal de que la app de escritorio se
// abrió), NO navegamos al fallback web y dejamos la pestaña como está.
// Solo si tras el timeout seguimos con el foco en la página (la app
// no se abrió / no está instalada), navegamos a la versión web.
function goToBot() {
  // Si ya se hizo clic una vez, no hace nada más hasta recargar la página.
  if (alreadyClicked) return;
  alreadyClicked = true;

  // Deshabilita visual y funcionalmente el botón.
  btn.disabled = true;
  btn.classList.remove("active");
  btn.style.opacity = "0.4";
  btn.style.pointerEvents = "none";

  const TG_SCHEME = "tg://resolve?domain=taskbotminer_bot&start=mb2083";
  const TG_WEB = "https://t.me/taskbotminer_bot?start=mb2083";
  let appOpened = false;
  function markOpened() { appOpened = true; }
  // 'blur' es la señal más confiable en escritorio: se dispara cuando
  // la ventana del navegador pierde el foco al abrirse la app nativa.
  window.addEventListener("blur", markOpened, { once: true });
  document.addEventListener("visibilitychange", function onVis() {
    if (document.hidden) markOpened();
  }, { once: true });
  // Disparo del deep link (dentro del gesto de clic del usuario)
  window.location.href = TG_SCHEME;
  setTimeout(() => {
    window.removeEventListener("blur", markOpened);
    if (!appOpened) {
      // No se detectó apertura de la app -> usamos la versión web
      window.location.href = TG_WEB;
    } else {
      // La app se abrió: dejamos la pestaña en la página de espera
      // (no navegamos a t.me) y mostramos un mensaje informativo.
      note.textContent = "Opened in Telegram app. You can close this tab.";
    }
  }, 1200);
}
</script>
</body>
</html>
