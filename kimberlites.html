<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBot Miner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container { text-align: center; padding: 30px 20px; }
.icon { font-size: 60px; margin-bottom: 20px; }
h1 { font-size: 22px; margin-bottom: 10px; color: #f0c040; }
p { font-size: 14px; color: #aaa; margin-bottom: 30px; }
.timer-box {
  background: #1a1a1a;
  border: 2px solid #f0c040;
  border-radius: 16px;
  padding: 20px 40px;
  margin-bottom: 30px;
  display: inline-block;
  transition: border-color 0.3s;
}
.timer-box.reopen {
  border-color: #e05555;
  cursor: pointer;
}
.timer { font-size: 48px; font-weight: bold; color: #f0c040; }
.timer-label { font-size: 12px; color: #888; margin-top: 4px; }
.btn {
  display: inline-block;
  background: #f0c040;
  color: #000;
  font-weight: bold;
  font-size: 16px;
  padding: 14px 32px;
  border-radius: 12px;
  text-decoration: none;
  opacity: 0.4;
  pointer-events: none;
  transition: opacity 0.3s;
  border: none;
  cursor: pointer;
  font-family: Arial, sans-serif;
}
.btn.active { opacity: 1; pointer-events: all; }
.note { font-size: 12px; color: #666; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🎁</div>
  <h1>TaskBot Miner</h1>
  <p>Please wait while your reward is being processed...</p>
  <div class="timer-box" id="timerBox" onclick="timerBoxClick()">
    <div class="timer" id="countdown">15</div>
    <div class="timer-label">seconds</div>
  </div>
  <br>
  <button class="btn" id="returnBtn" onclick="goToBot()">🔙 Back to the Bot</button>
  <div class="note" id="note">The button will be activated when the timer runs out</div>
</div>
<script>
// URL del smartlink, reutilizada tanto para la apertura inicial
// como para cuando el usuario tenga que reabrirlo.
const SMARTLINK_URL = "https://omg10.com/4/11379589";

const countdown = document.getElementById("countdown");
const timerBox = document.getElementById("timerBox");
const btn = document.getElementById("returnBtn");
const note = document.getElementById("note");

// Estado único del flujo, controlado todo desde el cuadro central:
// "counting"     -> contando los 15s con el anuncio abierto
// "needs_reopen" -> cerraron el anuncio antes de tiempo, hay que reabrir
// "done"         -> completó los 15s, anuncio cerrado automáticamente
let state = "counting";
let seconds = 15;
let mainTimer = null;

// Abre el smartlink en una pestaña nueva, guardando la referencia
// para poder revisar si sigue abierta y para cerrarla después.
let adWindow = window.open(SMARTLINK_URL, "_blank");

function tick() {
  // Si el usuario cerró la pestaña del anuncio antes de completar
  // los 15 segundos, se detiene el conteo y se exige reabrir.
  if (state === "counting" && adWindow && adWindow.closed) {
    clearInterval(mainTimer);
    state = "needs_reopen";
    countdown.textContent = "↻";
    timerBox.classList.add("reopen");
    note.textContent = "You closed the ad too early. You must wait 15 seconds. Tap the timer to reopen it.";
    return;
  }

  seconds--;
  if (seconds <= 0) {
    clearInterval(mainTimer);
    state = "done";
    // Cierra automáticamente la pestaña del anuncio al completar el tiempo.
    if (adWindow && !adWindow.closed) {
      adWindow.close();
    }
    countdown.textContent = "✔️";
    btn.classList.add("active");
    note.textContent = "¡Reward ready! Go back to the bot.";
  } else {
    countdown.textContent = seconds;
  }
}

mainTimer = setInterval(tick, 1000);

function timerBoxClick() {
  // Solo reacciona al clic cuando hace falta reabrir el anuncio.
  if (state !== "needs_reopen") return;

  adWindow = window.open(SMARTLINK_URL, "_blank");
  seconds = 15;
  state = "counting";
  countdown.textContent = seconds;
  timerBox.classList.remove("reopen");
  note.textContent = "The button will be activated when the timer runs out";
  mainTimer = setInterval(tick, 1000);
}

// Bandera para que el botón solo reaccione una vez por carga de página.
let alreadyClicked = false;

// Intenta abrir la app nativa de Telegram (tg://). Si detectamos que
// la ventana perdió el foco (señal de que la app de escritorio se
// abrió), NO navegamos al fallback web y dejamos la pestaña como está.
// Solo si tras el timeout seguimos con el foco en la página (la app
// no se abrió / no está instalada), navegamos a la versión web.
function goToBot() {
  // Si ya se hizo clic una vez, no hace nada más hasta recargar la página.
  if (alreadyClicked) return;
  alreadyClicked = true;

  // Deshabilita visual y funcionalmente el botón.
  btn.disabled = true;
  btn.classList.remove("active");
  btn.style.opacity = "0.4";
  btn.style.pointerEvents = "none";

  const TG_SCHEME = "tg://resolve?domain=taskbotminer_bot&start=mb2189";
  const TG_WEB = "https://t.me/taskbotminer_bot?start=mb2189";
  let appOpened = false;
  function markOpened() { appOpened = true; }
  // 'blur' es la señal más confiable en escritorio: se dispara cuando
  // la ventana del navegador pierde el foco al abrirse la app nativa.
  window.addEventListener("blur", markOpened, { once: true });
  document.addEventListener("visibilitychange", function onVis() {
    if (document.hidden) markOpened();
  }, { once: true });
  // Disparo del deep link (dentro del gesto de clic del usuario)
  window.location.href = TG_SCHEME;
  setTimeout(() => {
    window.removeEventListener("blur", markOpened);
    if (!appOpened) {
      // No se detectó apertura de la app -> usamos la versión web
      window.location.href = TG_WEB;
    } else {
      // La app se abrió: ya no se necesita esta pestaña.
      note.textContent = "Opened in Telegram app. Closing this tab...";
      // Solo funciona si el navegador permite cerrar esta pestaña por
      // script (depende de cómo se haya abierto). Si no lo permite,
      // no pasa nada visible: la pestaña simplemente se queda abierta
      // mostrando este mensaje.
      window.close();
    }
  }, 1200);
}
</script>
</body>
</html>
