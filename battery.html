<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBot Miner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    padding: 30px 20px;
  }
  .icon { font-size: 60px; margin-bottom: 20px; }
  h1 { font-size: 22px; margin-bottom: 10px; color: #f0c040; }
  p { font-size: 14px; color: #aaa; margin-bottom: 30px; }
  .timer-box {
    background: #1a1a1a;
    border: 2px solid #f0c040;
    border-radius: 16px;
    padding: 20px 40px;
    margin-bottom: 30px;
    display: inline-block;
  }
  .timer {
    font-size: 48px;
    font-weight: bold;
    color: #f0c040;
  }
  .timer-label { font-size: 12px; color: #888; margin-top: 4px; }
  .btn {
    display: inline-block;
    background: #f0c040;
    color: #000;
    font-weight: bold;
    font-size: 16px;
    padding: 14px 32px;
    border-radius: 12px;
    text-decoration: none;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .btn.active {
    opacity: 1;
    pointer-events: all;
  }
  .note { font-size: 12px; color: #666; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🔋</div>
  <h1>TaskBot Miner</h1>
  <p>Please wait while your reward is being processed...</p>

  <div class="timer-box">
    <div class="timer" id="countdown">10</div>
    <div class="timer-label">seconds</div>
  </div>

  <br>
  <a href="https://t.me/taskbotminer_bot?start=mb2014" class="btn" id="returnBtn">
    🔙 Back to the Bot
  </a>
  <div class="note" id="note">The button will be activated when the timer runs out</div>
</div>

<script>
  // Redirige al smartlink inmediatamente en nueva pestaña
  window.open("https://omg10.com/4/11092522", "_blank");

  // Cuenta regresiva
  let seconds = 10;
  const countdown = document.getElementById("countdown");
  const btn = document.getElementById("returnBtn");
  const note = document.getElementById("note");

  const timer = setInterval(() => {
    seconds--;
    countdown.textContent = seconds;

    if (seconds <= 0) {
      clearInterval(timer);
      countdown.textContent = "✓";
      btn.classList.add("active");
      note.textContent = "¡Reward ready! Go back to the bot.";
    }
  }, 1000);
</script>
</body>
</html>
